<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>file.jayha.top 上传</title>
  <style>
    :root {
      color-scheme: light;
      --card: rgba(255, 252, 247, 0.92);
      --text: #1f1a16;
      --muted: #6d6258;
      --line: rgba(86, 72, 58, 0.18);
      --accent: #b34d22;
      --accent-strong: #8f3611;
      --accent-soft: rgba(179, 77, 34, 0.12);
      --ok: #226f54;
      --bad: #aa2e25;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(179, 77, 34, 0.16), transparent 34%),
        radial-gradient(circle at bottom right, rgba(34, 111, 84, 0.16), transparent 28%),
        linear-gradient(135deg, #f6f0e8, #efe6d7 46%, #f8f4ed);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    main {
      width: min(920px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 24px 80px rgba(73, 53, 39, 0.12);
      overflow: hidden;
      backdrop-filter: blur(10px);
    }

    .hero {
      padding: 32px 32px 24px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(135deg, rgba(179, 77, 34, 0.08), rgba(255, 255, 255, 0));
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 13px;
      color: var(--accent-strong);
      background: var(--accent-soft);
      margin-bottom: 14px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(28px, 4vw, 40px);
      line-height: 1.05;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .panel {
      padding: 28px 32px 32px;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .nav {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    .pick,
    button,
    a.link,
    a.nav-link {
      appearance: none;
      border: 0;
      border-radius: 999px;
      font: inherit;
      text-decoration: none;
      padding: 12px 18px;
      cursor: pointer;
      transition: transform 140ms ease, background 140ms ease, opacity 140ms ease;
    }

    .pick,
    button {
      color: #fff7f1;
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      box-shadow: 0 10px 30px rgba(179, 77, 34, 0.18);
    }

    a.link,
    a.nav-link {
      color: var(--text);
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid var(--line);
    }

    .pick:hover,
    button:hover,
    a.link:hover,
    a.nav-link:hover {
      transform: translateY(-1px);
    }

    button[disabled] {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    input[type="file"] {
      display: none;
    }

    .hint {
      font-size: 14px;
      margin-bottom: 18px;
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      gap: 12px;
    }

    li {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px 16px;
      background: rgba(255, 255, 255, 0.76);
    }

    .row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: baseline;
      margin-bottom: 8px;
    }

    .name {
      word-break: break-all;
      font-weight: 600;
    }

    .meta {
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .bar {
      height: 10px;
      border-radius: 999px;
      background: rgba(109, 98, 88, 0.12);
      overflow: hidden;
    }

    .bar > span {
      display: block;
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #d36b3c, #226f54);
      transition: width 120ms linear;
    }

    .status {
      margin-top: 8px;
      font-size: 14px;
      color: var(--muted);
    }

    .status.ok {
      color: var(--ok);
    }

    .status.err {
      color: var(--bad);
    }

    .tip {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.68);
      color: var(--muted);
      line-height: 1.6;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <main>
    <section class="hero">
      <div class="eyebrow">上传入口 /upload</div>
      <h1>上传到 /uploads/</h1>
      <p>这个页面会把文件直接写入 <code>/var/www/files/uploads</code>，上传完成后可以在公开目录里直接访问。</p>
      <div class="nav">
        <a class="nav-link" href="/">根目录列表</a>
        <a class="nav-link" href="/uploads/">上传目录</a>
      </div>
    </section>
    <section class="panel">
      <div class="actions">
        <label class="pick" for="files">选择文件</label>
        <button id="start" disabled>开始上传</button>
        <a class="link" href="/uploads/">打开上传目录</a>
      </div>
      <p class="hint">支持多选；同名文件会被覆盖。当前上限是 2 GB/文件。</p>
      <input id="files" type="file" multiple>
      <ul id="queue"></ul>
      <div class="tip">上传完成后，文件公开地址是 <code>https://file.jayha.top/uploads/文件名</code>。</div>
    </section>
  </main>

  <script>
    const filesInput = document.getElementById("files");
    const startButton = document.getElementById("start");
    const queue = document.getElementById("queue");
    let files = [];

    function formatBytes(bytes) {
      const units = ["B", "KB", "MB", "GB", "TB"];
      let value = bytes;
      let unit = units[0];
      for (let i = 0; i < units.length && value >= 1024; i += 1) {
        unit = units[i + 1] || units[i];
        if (value < 1024 || i === units.length - 1) {
          break;
        }
        value /= 1024;
      }
      return `${value.toFixed(value >= 100 || unit === "B" ? 0 : 1)} ${unit}`;
    }

    function renderQueue() {
      queue.innerHTML = "";
      for (const file of files) {
        const item = document.createElement("li");
        item.innerHTML = `
          <div class="row">
            <div class="name"></div>
            <div class="meta">${formatBytes(file.size)}</div>
          </div>
          <div class="bar"><span></span></div>
          <div class="status">等待上传</div>
        `;
        item.querySelector(".name").textContent = file.name;
        file._elements = {
          bar: item.querySelector(".bar > span"),
          status: item.querySelector(".status")
        };
        queue.appendChild(item);
      }
      startButton.disabled = files.length === 0;
    }

    function setStatus(file, message, className) {
      file._elements.status.textContent = message;
      file._elements.status.className = `status ${className || ""}`.trim();
    }

    function setProgress(file, value) {
      file._elements.bar.style.width = `${Math.max(0, Math.min(100, value))}%`;
    }

    function uploadFile(file) {
      return new Promise((resolve, reject) => {
        const xhr = new XMLHttpRequest();
        const target = `/uploads/${encodeURIComponent(file.name)}`;
        xhr.open("PUT", target);
        xhr.responseType = "text";

        xhr.upload.addEventListener("progress", (event) => {
          if (!event.lengthComputable) {
            return;
          }
          setProgress(file, (event.loaded / event.total) * 100);
          setStatus(file, `上传中 ${Math.round((event.loaded / event.total) * 100)}%`);
        });

        xhr.addEventListener("load", () => {
          if (xhr.status >= 200 && xhr.status < 300) {
            setProgress(file, 100);
            const link = document.createElement("a");
            link.href = target;
            link.textContent = "打开文件";
            file._elements.status.innerHTML = "";
            file._elements.status.className = "status ok";
            file._elements.status.append("上传完成 ", link);
            resolve();
            return;
          }
          reject(new Error(`HTTP ${xhr.status}`));
        });

        xhr.addEventListener("error", () => reject(new Error("网络错误")));
        xhr.addEventListener("abort", () => reject(new Error("上传已取消")));
        xhr.setRequestHeader("Content-Type", "application/octet-stream");
        xhr.send(file);
      });
    }

    filesInput.addEventListener("change", () => {
      files = Array.from(filesInput.files || []);
      renderQueue();
    });

    startButton.addEventListener("click", async () => {
      startButton.disabled = true;
      for (const file of files) {
        try {
          setStatus(file, "准备上传");
          await uploadFile(file);
        } catch (error) {
          setStatus(file, `上传失败：${error.message}`, "err");
        }
      }
      if (files.length > 0) {
        filesInput.value = "";
        files = [];
      }
    });
  </script>
</body>
</html>
