server {
    listen 443 ssl;
    server_name file.jayha.top;
    ssl_certificate /etc/nginx/jayha.top/jayha.top.pem;
    ssl_certificate_key /etc/nginx/jayha.top/jayha.top.key;

    root /var/www/files;
    charset utf-8;

    location = /_file_browser {
        internal;
        alias /etc/nginx/jayha.top/file-browser.html;
        default_type text/html;
        add_header Cache-Control "no-store" always;
    }

    location = / {
        limit_except GET HEAD {
            deny all;
        }

        rewrite ^ /_file_browser last;
    }

    location = /upload {
        auth_basic "file-upload";
        auth_basic_user_file /etc/nginx/jayha.top/file-upload.htpasswd;
        alias /etc/nginx/jayha.top/file-upload.html;
        default_type text/html;
        add_header Cache-Control "no-store" always;
    }

    location ~ ^/(?!_listing/).+/$ {
        limit_except GET HEAD {
            deny all;
        }

        rewrite ^ /_file_browser last;
    }

    location ^~ /_listing/ {
        alias /var/www/files/;
        autoindex on;
        autoindex_format json;
        autoindex_exact_size off;
        autoindex_localtime on;
        add_header Cache-Control "no-store" always;

        limit_except GET HEAD OPTIONS {
            deny all;
        }

        if ($request_method = OPTIONS) {
            add_header Allow "GET, HEAD, OPTIONS" always;
            return 204;
        }
    }

    location /uploads/ {
        client_max_body_size 2g;
        client_body_timeout 300s;
        dav_methods PUT;
        create_full_put_path off;
        dav_access user:rw group:rw all:r;

        limit_except GET HEAD OPTIONS {
            auth_basic "file-upload";
            auth_basic_user_file /etc/nginx/jayha.top/file-upload.htpasswd;
        }

        if ($request_method = OPTIONS) {
            add_header Allow "GET, HEAD, OPTIONS, PUT" always;
            return 204;
        }
    }

    location / {
        if ($request_filename ~* \.(txt|md|json|log|xml|yaml|yml|ini|conf|js|css)$) {
            add_header Content-Type "text/plain; charset=utf-8" always;
        }

        if ($request_filename ~* \.(zip|rar|7z|gz|tar|exe|docx|xlsx|pptx|pdf)$) {
            add_header Content-Disposition "attachment";
        }

        sendfile on;
        sendfile_max_chunk 1m;
        tcp_nopush on;
        directio 5m;
        output_buffers 4 32k;
    }
}

server {
    listen 80;
    server_name file.jayha.top;
    return 301 https://$host$request_uri;
}
